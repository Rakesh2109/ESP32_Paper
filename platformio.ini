[env:esp32_p4_nano]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.32
board = esp32-p4-evboard
framework = arduino

board_build.mcu = esp32p4
board_build.flash_mode = qio

; Waveshare ESP32-P4-NANO routes USB Type-C through a CH343P USB-to-UART bridge
; connected to GPIO37 (TX) and GPIO38 (RX). The ESP32-P4's native USB OTG goes
; to the Type-A port instead. So we must use Serial2 for data communication.
build_flags = 
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DENABLE_DISPLAY=0
    -std=gnu++17
    -Wno-error=reorder
    -O3
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
    -ffast-math
    -DRECV_Q_CAP=256
    -DSERIAL2_TX_PIN=37
    -DSERIAL2_RX_PIN=38
    -DACTIVE_SERIAL=Serial2
    -DSERIAL2_BAUD=6000000

build_unflags = 
    -std=gnu++11
    -Os
    -O2
    -O0
    -Og

upload_speed = 1500000
monitor_speed = 6000000
build_type = release

upload_protocol = esptool
board_build.arduino.flash.compress = true

upload_flags = 
    --before=default_reset
    --after=hard_reset
    --baud=1500000
    --chip=esp32p4
    --connect-attempts=10

monitor_filters = 
    default
    esp32_exception_decoder

[env:esp32_p4_nano_fast]
extends = env:esp32_p4_nano
build_flags =
    ${env:esp32_p4_nano.build_flags}
    -DENABLE_BOUNDS_MONITORING=0

[env:esp32_p4_nano_fast_tm_sparse]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_SPARSE
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

[env:esp32_p4_nano_fast_tm_vanilla]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_VANILLA

[env:esp32_p4_nano_fast_tm_bo]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_BO
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

[env:esp32_p4_nano_fast_tm_all]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_BO
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

; CP2102/SLAB: 115200 baud for macOS termios compatibility (no 6M support)
[env:esp32_p4_nano_fast_tm_all_cp2102]
extends = env:esp32_p4_nano_fast_tm_all
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_BO
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35
    -DSERIAL2_BAUD=115200
; Keep tooling speeds conservative for CP2102 bridges.
upload_speed = 460800
monitor_speed = 115200
upload_flags =
    --before=default_reset
    --after=hard_reset
    --baud=460800
    --chip=esp32p4
    --connect-attempts=10

[env:esp32_p4_nano_fast_efdt]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_EFDT

[env:esp32_p4_nano_fast_hoeffding]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_HOEFFDING

[env:esp32_p4_nano_fast_hat]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_HAT

[env:esp32_p4_nano_fast_sgt]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_SGT

[env:esp32_p4_nano_fast_bnn]
extends = env:esp32_p4_nano_fast
build_flags =
    ${env:esp32_p4_nano_fast.build_flags}
    -DMODEL_TYPE=MODEL_BNN

[env:esp32_wokwi]
platform = espressif32
board = esp32dev
framework = arduino

build_flags = 
    -DENABLE_DISPLAY=0
    -std=gnu++17
    -Wno-error=reorder
    -O2
    -DWOKWI_SIMULATION=1

build_unflags = 
    -std=gnu++11

; Wokwi simulator configuration
platform_packages = 
    platformio/tool-openocd-esp32

; Use Wokwi CLI for simulation
; Install: pip install wokwi-cli
; Run: wokwi-cli --timeout 30000 .
test_speed = 115200


; Linker flags for memory optimization (commented to avoid conflicts with environment-specific settings)
; build_unflags = -std=c++11
extra_scripts = 
    pre:scripts/build_flags.py


; Source filtering
build_src_filter = 
    +<*.cpp>
    +<*.c>
    +<src/>
    +<include/>
    -<*.bak>
    -<test/>


; Native environment with socket transport (for test_serial.py)
[env:native]
platform = native
build_flags = 
    -std=gnu++17
    -I include
    -I shims/arduino/include
    -I include/hal
    -D NATIVE_BUILD
    -D HAL_SOCKET_TRANSPORT
    -lws2_32
test_build_src = yes
test_framework = custom
build_src_filter = 
    +<*>
    +<../shims/arduino/src/*.cpp>
    +<../include/hal/desktop/socket_stream.cpp>
    +<../include/hal/desktop/hal_transport.cpp>
    +<../include/hal/desktop/hal_main.cpp>
    +<../include/hal/desktop/log_serial.cpp>
    -<*.bak>
