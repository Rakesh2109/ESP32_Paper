; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
test_dir = tests
default_envs = esp32_c3_mini
; Common build settings for all environments
[env]
build_src_filter = 
    +<*>
    +<../include/hal/esp32/*.cpp>
    -<*.bak>

[env:adafruit_feather_esp32s3_reversetft]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino

[env:esp32_trainer]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino
board_build.cdc_on_boot = 1
lib_deps = 
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_CACHE_WORKAROUND
    -std=gnu++17
    -Wno-error=reorder
    -O3
    ; -DCONFIG_ESP_TASK_WDT=0


[env:esp32_s3_n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.cdc_on_boot = 1
board_build.f_cpu = 240000000L

; ESP32-S3-N16R8: native USB CDC (HWCDC via USB-JTAG/Serial).
; Serial = HWCDCSerial, no UART bridge needed.
build_flags = 
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DENABLE_DISPLAY=0
    -std=gnu++17
    -Wno-error=reorder
    -O3
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
    -ffast-math
    -DRECV_Q_CAP=128
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_CACHE_WORKAROUND

build_unflags = 
    -std=gnu++11
    -Os
    -O2
    -O0
    -Og

; Flash Configuration
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partition_n16r8.csv

upload_speed = 921600
monitor_speed = 115200
build_type = release

upload_protocol = esptool
board_build.arduino.flash.compress = true

upload_flags = 
    --before=default_reset
    --after=hard_reset
    --baud=921600
    --chip=esp32s3
    --connect-attempts=10

monitor_filters = 
    default
    esp32_exception_decoder

[env:esp32_s3_n16r8_fast]
extends = env:esp32_s3_n16r8
build_flags =
    ${env:esp32_s3_n16r8.build_flags}
    -DENABLE_BOUNDS_MONITORING=0

[env:esp32_s3_n16r8_fast_tm_sparse]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_SPARSE
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

[env:esp32_s3_n16r8_fast_tm_vanilla]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_VANILLA

[env:esp32_s3_n16r8_fast_tm_bo]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_BO
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

[env:esp32_s3_n16r8_fast_tm_all]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_TM_BO
    -DTM_USE_NZ=1
    -DTM_INIT_LITERAL_DENSITY_PCT=35

[env:esp32_s3_n16r8_fast_efdt]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_EFDT

[env:esp32_s3_n16r8_fast_hoeffding]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_HOEFFDING

[env:esp32_s3_n16r8_fast_hat]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_HAT

[env:esp32_s3_n16r8_fast_sgt]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_SGT

[env:esp32_s3_n16r8_fast_bnn]
extends = env:esp32_s3_n16r8_fast
build_flags =
    ${env:esp32_s3_n16r8_fast.build_flags}
    -DMODEL_TYPE=MODEL_BNN




