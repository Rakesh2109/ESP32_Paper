[env:esp32_c3_mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

board_build.cdc_on_boot = 1
board_build.f_cpu = 160000000L

; ESP32-C3-Mini: RISC-V single core 160 MHz, 400KB SRAM, no PSRAM, 4MB Flash.
; USB-JTAG/Serial (HWCDC) for native USB CDC.
; RAM is tight so we use smaller queue and RX buffer.
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DENABLE_DISPLAY=0
    -std=gnu++17
    -Wno-error=reorder
    -O3
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
    -ffast-math
    -DRECV_Q_CAP=32
    -DSERIAL_RX_BUFFER_SIZE=4096

build_unflags = 
    -std=gnu++11
    -Os
    -O2
    -O0
    -Og

board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

upload_speed = 921600
monitor_speed = 115200
build_type = release

upload_protocol = esptool
board_build.arduino.flash.compress = true

upload_flags = 
    --before=default_reset
    --after=hard_reset
    --baud=921600
    --chip=esp32c3
    --connect-attempts=10

monitor_filters = 
    default
    esp32_exception_decoder

[env:esp32_c3_mini_fast]
extends = env:esp32_c3_mini
build_flags =
    ${env:esp32_c3_mini.build_flags}
    -DENABLE_BOUNDS_MONITORING=0

[env:esp32_c3_mini_fast_tm_sparse]
